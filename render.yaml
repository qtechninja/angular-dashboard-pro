services:
  - type: web
    name: angular-dashboard-pro-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://angular-dashboard-pro-web.onrender.com

  - type: web
    name: angular-dashboard-pro-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://angular-dashboard-pro-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
